name: Apply Premium Theme

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/apply-premium.js"
      - ".github/workflows/apply-premium.yml"

permissions:
  contents: write

jobs:
  apply-premium:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply premium visual update
        run: node scripts/apply-premium.js

      - name: Commit premium update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aplica layout premium no sistema IV"
          file_pattern: index.html
