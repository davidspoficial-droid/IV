name: Fix web report logic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-web-report-logic.yml'

permissions:
  contents: write

jobs:
  fix-report-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make web reports use mobile report base
        run: |
          python3 - <<'PY'
          from pathlib import Path

          report = Path('report-fix.js')
          s = report.read_text(encoding='utf-8')
          old = "if(tipo==='visao'){let data=buildReportData(mods);html=relVersao==='web'?gerarHTMLWeb(data,titulo):gerarHTMLMobile(data,titulo)}else html=htmlAlunos(tipo,mod,titulo,relVersao);"
          new = "if(tipo==='visao'){let data=buildReportData(mods);html=gerarHTMLMobile(data,titulo);if(relVersao==='web'){html=html.replace('<body>','<body class=\"rel-web\">').replace('<style>','<style>body.rel-web{padding:28px 24px!important}body.rel-web .phone,body.rel-web .mobile-shell,body.rel-web .app,body.rel-web main{max-width:1100px!important;width:100%!important;margin-left:auto!important;margin-right:auto!important}body.rel-web .kpi-row,body.rel-web .cards,body.rel-web .grid{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))!important}')}}else html=htmlAlunos(tipo,mod,titulo,relVersao);"
          if old not in s:
              raise SystemExit('Target line not found in report-fix.js')
          s = s.replace(old, new)
          report.write_text(s, encoding='utf-8')

          index = Path('index.html')
          h = index.read_text(encoding='utf-8')
          h = h.replace('./report-fix.js?v=3', './report-fix.js?v=4')
          index.write_text(h, encoding='utf-8')
          PY
      - name: Commit change
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report-fix.js index.html
          git commit -m "Make web reports use same base as mobile reports"
          git push
