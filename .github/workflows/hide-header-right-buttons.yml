name: Hide header right buttons

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - .github/workflows/hide-header-right-buttons.yml
      - .github/scripts/hide-header-right-buttons.py

permissions:
  contents: write

jobs:
  hide-buttons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add CSS to hide top header buttons
        shell: bash
        run: python3 .github/scripts/hide-header-right-buttons.py

      - name: Commit change
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Hide top backup and report buttons"
          git push
