name: Hide header right buttons

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hide-header-right-buttons.yml'

permissions:
  contents: write

jobs:
  hide-buttons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add CSS to hide top header buttons
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          h = p.read_text(encoding='utf-8')
          css = '''
/* Oculta botões superiores: Salvar Backup e Gerar Relatório */
.header-right{display:none!important;}
'''
          if 'Oculta botões superiores: Salvar Backup e Gerar Relatório' not in h:
              h = h.replace('</style>', css + '\n</style>', 1)
          p.write_text(h, encoding='utf-8')
          PY
      - name: Commit change
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Hide top backup and report buttons"
          git push
