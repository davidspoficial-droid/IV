name: Insert report fix safely

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/insert-report-fix-safely.yml'

permissions:
  contents: write

jobs:
  insert-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert report fix only before final body tag
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          tag = '<script src="./report-fix.js?v=3"></script>'
          html = html.replace('<script src="./report-fix.js?v=2"></script>\n', '')
          html = html.replace('<script src="./report-fix.js?v=2"></script>', '')
          html = html.replace('<script src="./report-fix.js?v=3"></script>\n', '')
          html = html.replace('<script src="./report-fix.js?v=3"></script>', '')
          pos = html.rfind('</body>')
          if pos == -1:
              raise SystemExit('Final body tag not found')
          html = html[:pos] + tag + '\n' + html[pos:]
          p.write_text(html, encoding='utf-8')
          PY
      - name: Commit change
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Load report fix safely"
          git push
