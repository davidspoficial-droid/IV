name: Load history list report

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/load-history-list.yml'

permissions:
  contents: write

jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert history list script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          h=p.read_text(encoding='utf-8')
          tag='<script src="./report-history-list.js?v=1"></script>'
          h=h.replace(tag+'\n','').replace(tag,'')
          pos=h.rfind('</body>')
          if pos==-1:
              raise SystemExit('body tag not found')
          h=h[:pos]+tag+'\n'+h[pos:]
          p.write_text(h,encoding='utf-8')
          PY
      - name: Commit change
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Load winner history list renderer"
          git push
