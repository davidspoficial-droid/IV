name: Patch index report generator
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/patch-index-reports.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html report flow
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          new_export = r'''<!-- ══ EXPORTAR ══ -->
<div id="page-exportar" class="page">
  <div class="stitle">📤 Gerar Relatório <small>por link, sem baixar arquivo</small></div>
  <div class="card" style="margin-bottom:20px">
    <div class="form-row tri">
      <div>
        <label>Título do Relatório</label>
        <input id="exp-titulo" placeholder="Instituto de Vencedores" value="Instituto de Vencedores">
      </div>
      <div>
        <label>Tipo de Relatório</label>
        <select id="exp-tipo">
          <option value="visao">📊 Visão Geral atual</option>
          <option value="alunos">🎓 Relatório geral dos alunos</option>
          <option value="modulo">📘 Relatório por módulo</option>
          <option value="turma">🏫 Relatório por turma</option>
          <option value="caminho">🧭 Grade do caminho do aluno</option>
        </select>
      </div>
      <div>
        <label>Módulo</label>
        <select id="exp-modulo">
          <option value="todos">Todos os Módulos</option>
          <option value="1">1º Módulo</option>
          <option value="2">2º Módulo</option>
          <option value="3">3º Módulo</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Versão do relatório</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
          <button class="ptab active" id="tab-mobile" onclick="setVersaoRelatorio('mobile',this)">📱 Mobile</button>
          <button class="ptab" id="tab-web" onclick="setVersaoRelatorio('web',this)">💻 Web</button>
        </div>
      </div>
      <div id="device-mobile-box">
        <label>Dispositivo mobile</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
          <button class="ptab active" id="tab-android" onclick="setDisp('android',this)">📱 Android</button>
          <button class="ptab" id="tab-iphone" onclick="setDisp('iphone',this)">🍎 iPhone</button>
        </div>
      </div>
    </div>
  </div>
  <div class="export-grid">
    <div class="export-card" onclick="gerarRelatorioLink()">
      <div class="export-icon">🔗</div>
      <div class="export-name">Gerar Link do Relatório</div>
      <div class="export-desc">Escolha o tipo de relatório e a versão Web ou Mobile. O sistema gera um link para compartilhar no WhatsApp, sem baixar arquivo HTML.</div>
    </div>
    <div id="modal-link" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9000;align-items:center;justify-content:center;padding:20px">
      <div style="background:#0D1626;border:1px solid #1E2E4A;border-radius:16px;padding:28px;max-width:480px;width:100%">
        <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:8px">🔗 Link gerado!</div>
        <div style="font-size:13px;color:#6B8AB0;margin-bottom:14px">Mensagem que será enviada no WhatsApp:</div>
        <div id="whats-preview" style="background:#0A2E1A;border:1px solid #1E5C36;border-radius:10px;padding:12px 14px;font-size:13px;color:#E8F0FF;white-space:pre-line;line-height:1.6;margin-bottom:14px;font-family:'DM Sans',sans-serif"></div>
        <input id="link-gerado" readonly style="display:none">
        <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
          <button class="btn btn-ghost" onclick="document.getElementById('modal-link').style.display='none'">Fechar</button>
          <button class="btn btn-blue" onclick="copiarLink()">📋 Copiar mensagem</button>
          <button class="btn btn-green" onclick="abrirWhatsApp()">📲 Abrir WhatsApp</button>
          <button class="btn btn-ghost" onclick="window.open(document.getElementById('link-gerado').value,'_blank')">🌐 Abrir link</button>
        </div>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:20px">
    <div class="card-title">💾 Backup de Dados</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-ghost" onclick="exportarDados()">⬇️ Baixar Backup JSON</button>
      <label class="btn btn-ghost" style="cursor:pointer">⬆️ Carregar Backup<input type="file" accept=".json" style="display:none" onchange="importarDados(this)"></label>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:10px">O backup salva todos os alunos, equipes e presenças. Os relatórios agora são gerados por link.</p>
  </div>
</div>

'''
          s = re.sub(r'<!-- ══ EXPORTAR ══ -->.*?<!-- ══ MODAL AVANÇAR MÓDULO ══ -->', new_export + '<!-- ══ MODAL AVANÇAR MÓDULO ══ -->', s, flags=re.S)

          s = re.sub(r"let dispositivoMobile = 'android';\s*function setDisp\(tipo, btn\)\{.*?\n\}", """let dispositivoMobile = 'android';
let versaoRelatorio = 'mobile';
function setDisp(tipo, btn){
  dispositivoMobile = tipo;
  document.querySelectorAll('#tab-android,#tab-iphone').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setVersaoRelatorio(tipo, btn){
  versaoRelatorio = tipo;
  document.querySelectorAll('#tab-mobile,#tab-web').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const box=document.getElementById('device-mobile-box');
  if(box) box.style.display = tipo==='mobile' ? 'block' : 'none';
}
""", s, flags=re.S)

          helper = r'''
function relTipoNome(tipo){
  return ({visao:'Visão Geral atual',alunos:'Relatório geral dos alunos',modulo:'Relatório por módulo',turma:'Relatório por turma',caminho:'Grade do caminho do aluno'})[tipo] || 'Relatório';
}
function turmaNomeRel(v){ return v==='quinta'?'Quinta-feira':v==='sabado'?'Sábado':'Sem turma'; }
function equipeNomeRel(a){ const e=DB.equipes.find(x=>x.id===a.equipeId); return e?e.nome:'Sem equipe'; }
function totalAulasModuloRel(m){ return MODULOS[m].semanas.reduce((n,s)=>n+s.aulas.length,0); }
function calcAlunoModuloRel(a,m){
  let p=0,t=totalAulasModuloRel(m), atual=parseInt(a.modulo||'1');
  MODULOS[m].semanas.forEach((sem,si)=>sem.aulas.forEach(au=>{ if(DB.presencas[presKey(a.id,m,si,au)]) p++; }));
  const conta=m<=atual||p>0;
  const faltas=conta?Math.max(t-p,0):0;
  const status=m<atual?'Concluído':m===atual?'Módulo ativo':p>0?'Iniciado':'Próximo módulo';
  return {presentes:p,total:t,faltas,pct:t?Math.round(p/t*100):0,status};
}
function buildAlunosRelData(modFiltro){
  return DB.alunos.filter(a=>modFiltro==='todos'||String(a.modulo||'1')===String(modFiltro)).map(a=>{
    const atual=parseInt(a.modulo||'1');
    const mods=[1,2,3].map(m=>calcAlunoModuloRel(a,m));
    const pres=mods.reduce((s,x)=>s+x.presentes,0), faltas=mods.reduce((s,x)=>s+x.faltas,0), total=mods.reduce((s,x)=>s+x.total,0);
    return {nome:a.nome||'—',inscricao:a.inscricao||'',modulo:MODULOS[atual]?MODULOS[atual].nome:atual+'º Módulo',atual,equipe:equipeNomeRel(a),turma:turmaNomeRel(a.turma),situacao:a.situacao||'ATIVO',mods,pres,faltas,pct:total?Math.round(pres/total*100):0};
  }).sort((a,b)=>a.atual-b.atual||a.nome.localeCompare(b.nome,'pt-BR'));
}
function agruparRel(rows,fn){ const o={}; rows.forEach(a=>(o[fn(a)]=o[fn(a)]||[]).push(a)); return Object.entries(o).sort((a,b)=>b[1].length-a[1].length); }
function resumoRowsRel(rows){ const ativos=rows.filter(a=>(a.situacao||'ATIVO')==='ATIVO').length, faltas=rows.reduce((s,a)=>s+a.faltas,0), pres=rows.reduce((s,a)=>s+a.pres,0); return {total:rows.length,ativos,des:rows.length-ativos,faltas,pct:pres+faltas?Math.round(pres/(pres+faltas)*100):0}; }
function gerarHTMLAlunosRel(tipo, modFiltro, titulo, versao){
  const rows=buildAlunosRelData(modFiltro), dt=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}), nome=relTipoNome(tipo);
  const css='<style>*{box-sizing:border-box}body{margin:0;padding:'+(versao==='mobile'?'12px':'28px')+';background:radial-gradient(circle at 12% 0,rgba(47,128,237,.25),transparent 32%),linear-gradient(145deg,#020611,#07111F 48%,#030712);color:#EAF4FF;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}.shell{max-width:1100px;margin:auto;background:linear-gradient(145deg,rgba(255,255,255,.055),rgba(255,255,255,.016)),rgba(8,19,36,.84);border:1px solid rgba(126,200,240,.18);border-radius:26px;box-shadow:0 26px 80px rgba(0,0,0,.42);overflow:hidden}.hero{padding:24px;background:linear-gradient(135deg,rgba(7,17,31,.96),rgba(16,40,70,.82));border-bottom:1px solid rgba(126,200,240,.16)}.badge{display:inline-block;padding:7px 12px;border-radius:999px;background:linear-gradient(135deg,#2F80ED,#22D3EE);font-size:11px;font-weight:900}.title{font-size:30px;font-weight:950;margin-top:8px}.sub{color:#9CB8D6;font-size:12px}.content{padding:22px}.kpis{display:grid;grid-template-columns:repeat('+(versao==='mobile'?'2':'4')+',1fr);gap:10px;margin-bottom:16px}.kpi,.card{background:rgba(7,17,31,.76);border:1px solid rgba(126,200,240,.15);border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 16px 40px rgba(0,0,0,.22)}.num{font-size:30px;font-weight:950;color:var(--c)}.txt{font-size:10px;color:#8FAACB;text-transform:uppercase;font-weight:900;letter-spacing:1px}.st{font-size:17px;font-weight:900;color:#7EC8F0;margin-bottom:12px}table{width:100%;border-collapse:collapse;font-size:12px;min-width:'+(versao==='mobile'?'720px':'820px')+'}th{background:#102846;color:#7EC8F0;text-align:left;padding:9px;font-size:10px;text-transform:uppercase}td{padding:9px;border-bottom:1px solid rgba(126,200,240,.1)}.table{overflow:auto}.tag{display:inline-flex;padding:4px 9px;border-radius:999px;font-size:10px;font-weight:900}.b{background:rgba(74,144,217,.14);color:#7EC8F0}.g{background:rgba(62,201,122,.14);color:#7EDBA8}.r{background:rgba(224,85,85,.14);color:#F08080}.p{background:rgba(155,89,182,.16);color:#D8A7ED}.route{display:grid;grid-template-columns:repeat('+(versao==='mobile'?'1':'3')+',1fr);gap:10px}.step{border:1px solid rgba(126,200,240,.15);border-radius:15px;padding:10px;background:rgba(255,255,255,.035)}@media(max-width:780px){.kpis{grid-template-columns:1fr 1fr}.route{grid-template-columns:1fr}.content{padding:14px}body{padding:10px}}</style>';
  const r=resumoRowsRel(rows);
  let body='<div class="kpis"><div class="kpi" style="--c:#7EC8F0"><div class="num">'+r.total+'</div><div class="txt">Alunos</div></div><div class="kpi" style="--c:#3EC97A"><div class="num">'+r.ativos+'</div><div class="txt">Ativos</div></div><div class="kpi" style="--c:#E05555"><div class="num">'+r.faltas+'</div><div class="txt">Faltas</div></div><div class="kpi" style="--c:#9B59B6"><div class="num">'+r.pct+'%</div><div class="txt">Presença</div></div></div>';
  const tabelaAlunos=()=>'<div class="table"><table><thead><tr><th>Aluno</th><th>Inscrição</th><th>Módulo ativo</th><th>Turma</th><th>Equipe</th><th>Situação</th><th>Presença</th><th>Faltas M1</th><th>Faltas M2</th><th>Faltas M3</th></tr></thead><tbody>'+rows.map(a=>'<tr><td><b>'+a.nome+'</b></td><td>'+(a.inscricao||'—')+'</td><td><span class="tag b">'+a.modulo+'</span></td><td>'+a.turma+'</td><td>'+a.equipe+'</td><td><span class="tag '+(a.situacao==='DESISTENTE'?'r':'g')+'">'+a.situacao+'</span></td><td><span class="tag p">'+a.pct+'%</span></td><td>'+a.mods[0].faltas+'</td><td>'+a.mods[1].faltas+'</td><td>'+a.mods[2].faltas+'</td></tr>').join('')+'</tbody></table></div>';
  const tabelaGrupo=(items)=>'<div class="table"><table><thead><tr><th>Grupo</th><th>Alunos</th><th>Ativos</th><th>Desist.</th><th>Faltas</th><th>Presença</th></tr></thead><tbody>'+items.map(([n,rs])=>{const x=resumoRowsRel(rs);return '<tr><td><b>'+n+'</b></td><td>'+x.total+'</td><td><span class="tag g">'+x.ativos+'</span></td><td><span class="tag r">'+x.des+'</span></td><td>'+x.faltas+'</td><td><span class="tag p">'+x.pct+'%</span></td></tr>';}).join('')+'</tbody></table></div>';
  if(tipo==='alunos') body+='<div class="card"><div class="st">Relatório geral dos alunos</div>'+tabelaAlunos()+'</div>';
  if(tipo==='modulo') body+='<div class="card"><div class="st">Relatório por módulo</div>'+tabelaGrupo(agruparRel(rows,a=>a.modulo))+'</div>';
  if(tipo==='turma') body+='<div class="card"><div class="st">Relatório por turma</div>'+tabelaGrupo(agruparRel(rows,a=>a.turma))+'</div>';
  if(tipo==='caminho') body+=rows.map(a=>'<div class="card"><div class="st">'+a.nome+'</div><div class="sub">'+a.equipe+' · '+a.turma+' · Módulo ativo: '+a.modulo+'</div><div class="route" style="margin-top:12px">'+[1,2,3].map(m=>{const z=a.mods[m-1];return '<div class="step"><b>'+MODULOS[m].nome+'</b><div class="sub">'+z.status+'</div><div style="margin-top:8px"><span class="tag g">'+z.presentes+'/'+z.total+' pres.</span> <span class="tag r">'+z.faltas+' faltas</span> <span class="tag b">'+z.pct+'%</span></div></div>';}).join('')+'</div></div>').join('');
  return '<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+titulo+' — '+nome+'</title>'+css+'</head><body><main class="shell"><header class="hero"><div class="badge">'+nome+' · Versão '+(versao==='web'?'Web':'Mobile')+'</div><div class="title">'+titulo+'</div><div class="sub">Gerado em '+dt+' · Instituto de Vencedores</div></header><section class="content">'+body+'</section></main></body></html>';
}
'''
          if 'function gerarHTMLAlunosRel(' not in s:
              s = s.replace('function gerarHTMLWeb(data, titulo){', helper + '\nfunction gerarHTMLWeb(data, titulo){')

          new_link = r'''async function gerarRelatorioLink(){
  const modFiltro = document.getElementById('exp-modulo').value;
  const titulo    = document.getElementById('exp-titulo').value||'Instituto de Vencedores';
  const tipoRel   = (document.getElementById('exp-tipo')||{}).value || 'visao';
  const modulosParaIncluir = modFiltro==='todos'?[1,2,3]:[parseInt(modFiltro)];
  let html;
  if(tipoRel === 'visao'){
    const reportData = buildReportData(modulosParaIncluir);
    html = versaoRelatorio === 'web' ? gerarHTMLWeb(reportData, titulo) : gerarHTMLMobile(reportData, titulo);
  } else {
    html = gerarHTMLAlunosRel(tipoRel, modFiltro, titulo, versaoRelatorio);
  }
  const ultima = detectarUltimaSemana(modulosParaIncluir);
  toast('Gerando link, aguarde...⏳');
  try {
    const id = 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const { getFirestore, doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const db2 = getFirestore();
    await setDoc(doc(db2, "relatorios", id), { html, titulo, tipo: relTipoNome(tipoRel), versao: versaoRelatorio, criadoEm: new Date().toISOString() });
    const link = `${location.origin}/relatorio?id=${id}`;
    document.getElementById('link-gerado').value = link;
    const msgPrevia = montarMensagemWhats(link, ultima, relTipoNome(tipoRel));
    const prevEl = document.getElementById('whats-preview');
    if(prevEl) prevEl.textContent = msgPrevia;
    window._ultimaSemana = ultima;
    window._tipoRelatorioAtual = relTipoNome(tipoRel);
    document.getElementById('modal-link').style.display = 'flex';
    toast('Link gerado! ✓');
  } catch(e) { console.error(e); toast('Erro ao gerar link. Tente novamente.', true); }
}
'''
          s = re.sub(r'async function gerarRelatorioLink\(\)\{.*?\n\}', new_link, s, flags=re.S)
          s = re.sub(r'function montarMensagemWhats\(link, porModulo\)\{.*?\n\}', r'''function montarMensagemWhats(link, porModulo, tipoRel){
  let linhasModulos = '';
  if(Array.isArray(porModulo) && porModulo.length > 0){
    linhasModulos = porModulo.map(function(item){ return semLabelCurto(item) + ' - ' + item.nomeModulo; }).join('\n');
  } else { linhasModulos = '📅 Relatório'; }
  return `📊 *${tipoRel || 'Relatório'} – Instituto de Vencedores*\n\n${linhasModulos}\n\n🔗 Acesse pelo link:\n${link}`;
}
''', s, flags=re.S)
          s = re.sub(r'function gerarRelatorio\(tipo\)\{.*?\n\}', "function gerarRelatorio(tipo){\n  return gerarRelatorioLink();\n}\n", s, flags=re.S)
          s = s.replace('const msg   = montarMensagemWhats(link, ultima);', "const msg   = montarMensagemWhats(link, ultima, window._tipoRelatorioAtual || 'Relatório');")
          s = s.replace('const msg    = montarMensagemWhats(link, ultima);', "const msg    = montarMensagemWhats(link, ultima, window._tipoRelatorioAtual || 'Relatório');")
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patched index
        run: |
          if git diff --quiet; then echo "No changes"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update report generator to link-based web and mobile reports"
          git push
