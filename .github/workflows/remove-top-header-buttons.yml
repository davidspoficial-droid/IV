name: Remove top header buttons

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - .github/workflows/remove-top-header-buttons.yml

permissions:
  contents: write

jobs:
  remove-buttons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove backup and report buttons from header
        shell: bash
        run: python3 .github/scripts/remove-top-header-buttons.py

      - name: Commit change
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Remove backup and report buttons from header"
          git push
