name: Restore index and load report layout

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restore-index-and-load-layout.yml'

permissions:
  contents: write

jobs:
  restore-and-load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore working index and insert layout script
        run: |
          git checkout 01daf47bca66d430141a88024acabcb0900a848b -- index.html
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          h=p.read_text(encoding='utf-8')
          tag='<script src="./report-layout.js?v=1"></script>'
          h=h.replace('<script src="./report-layout.js?v=1"></script>\n','').replace('<script src="./report-layout.js?v=1"></script>','')
          pos=h.rfind('</body>')
          if pos==-1:
              raise SystemExit('body tag not found')
          h=h[:pos]+tag+'\n'+h[pos:]
          p.write_text(h,encoding='utf-8')
          PY
      - name: Commit restored index
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Restore index and load premium report layout"
          git push
