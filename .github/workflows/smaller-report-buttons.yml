name: Smaller report buttons

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/smaller-report-buttons.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch report layout button styles
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('report-layout.js')
          s = p.read_text(encoding='utf-8')
          s = s.replace(
            ".reports-segmented{display:flex;gap:10px;flex-wrap:wrap}.seg-btn{min-width:128px;height:46px;border-radius:14px;border:1px solid rgba(126,200,240,.16);background:rgba(2,10,24,.7);color:#DBE9FF;font-weight:800;cursor:pointer;transition:.2s}.seg-btn:hover{transform:translateY(-1px);border-color:rgba(126,200,240,.32)}.seg-btn.active{background:linear-gradient(135deg,#2F80ED,#155DFC);box-shadow:0 14px 34px rgba(47,128,237,.28);color:white}",
            ".reports-segmented{display:flex;gap:8px;flex-wrap:wrap}.seg-btn{min-width:104px;height:36px;padding:0 14px;border-radius:999px;border:1px solid rgba(126,200,240,.18);background:linear-gradient(145deg,rgba(8,19,36,.92),rgba(3,10,23,.82));color:#DDEBFF;font-size:12px;font-weight:800;cursor:pointer;transition:.2s;box-shadow:0 8px 18px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.035)}.seg-btn:hover{transform:translateY(-1px);border-color:rgba(126,200,240,.36);box-shadow:0 12px 24px rgba(0,0,0,.26),0 0 14px rgba(47,128,237,.10)}.seg-btn.active{background:linear-gradient(135deg,#256FDF,#1E9BFF);box-shadow:0 10px 24px rgba(47,128,237,.24),inset 0 1px 0 rgba(255,255,255,.18);color:white;border-color:rgba(126,200,240,.36)}"
          )
          s = s.replace(
            ".report-link-icon{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:43px;margin-bottom:22px;background:radial-gradient(circle,rgba(33,115,255,.45),rgba(5,16,35,.95));border:1px solid rgba(126,200,240,.28);box-shadow:0 22px 44px rgba(0,0,0,.44),0 0 34px rgba(47,128,237,.28)}",
            ".report-link-icon{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:20px;background:radial-gradient(circle,rgba(33,115,255,.42),rgba(5,16,35,.95));border:1px solid rgba(126,200,240,.26);box-shadow:0 18px 38px rgba(0,0,0,.42),0 0 28px rgba(47,128,237,.22)}"
          )
          s = s.replace(
            ".report-generate-btn{min-width:330px;height:58px;border:0;border-radius:999px;background:linear-gradient(135deg,#2196F3,#155DFC);color:#fff;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 22px 45px rgba(33,150,243,.35);transition:.2s}.report-generate-btn:hover{transform:translateY(-2px);box-shadow:0 28px 55px rgba(33,150,243,.42)}",
            ".report-generate-btn{min-width:0;width:auto;height:42px;padding:0 22px;border:0;border-radius:999px;background:linear-gradient(135deg,#2388F2,#155DFC);color:#fff;font-size:14px;font-weight:900;letter-spacing:.01em;cursor:pointer;box-shadow:0 14px 28px rgba(33,150,243,.28),inset 0 1px 0 rgba(255,255,255,.18);transition:.2s}.report-generate-btn:hover{transform:translateY(-2px);box-shadow:0 18px 36px rgba(33,150,243,.34)}"
          )
          s = s.replace(
            ".report-generate-btn{min-width:100%;font-size:16px}",
            ".report-generate-btn{width:auto;min-width:210px;height:40px;font-size:13px;padding:0 18px}.seg-btn{min-width:94px;height:34px;font-size:11px;padding:0 12px}"
          )
          s = s.replace('>🔗 Gerar Link do Relatório →</button>', '>🔗 Gerar Link</button>')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report-layout.js
          git commit -m "Make report page buttons smaller and rounder"
          git push
