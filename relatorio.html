<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Relatório — Instituto de Vencedores</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050A14;color:#E8F0FF;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
#loading{text-align:center;padding:40px 20px}
.spinner{width:44px;height:44px;border:4px solid #1E2E4A;border-top-color:#4A90D9;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:16px;color:#7EC8F0;font-weight:600;margin-bottom:6px}
.loading-sub{font-size:12px;color:#6B8AB0}
#erro{display:none;text-align:center;padding:40px 20px}
.erro-icon{font-size:48px;margin-bottom:12px}
.erro-txt{font-size:16px;color:#E05555;font-weight:600;margin-bottom:6px}
.erro-sub{font-size:13px;color:#6B8AB0}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Carregando relatório...</div>
  <div class="loading-sub">Instituto de Vencedores</div>
</div>

<div id="erro">
  <div class="erro-icon">😕</div>
  <div class="erro-txt">Relatório não encontrado</div>
  <div class="erro-sub">O link pode ter expirado ou estar incorreto.</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCAbjeFpJCTfxB9MIsAkM0FYd0cv2OOGh0",
    authDomain: "instituto-de-vencedores-iv.firebaseapp.com",
    projectId: "instituto-de-vencedores-iv",
    storageBucket: "instituto-de-vencedores-iv.firebasestorage.app",
    messagingSenderId: "576601736407",
    appId: "1:576601736407:web:49bf141159071bf6a2dc92",
    measurementId: "G-956ZTG8WM0"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  function aplicarDestaqueEquipes(html){
    if(!html || !html.includes('iv-review-team')) return html;
    const css = `<style id="iv-report-team-highlight">
.iv-review-team{position:relative!important;border:1px solid rgba(74,144,217,.38)!important;border-radius:14px!important;background:linear-gradient(145deg,rgba(18,48,84,.72),rgba(7,17,31,.94))!important;box-shadow:0 10px 26px rgba(0,0,0,.22)!important;overflow:hidden!important}
.iv-review-team>summary{position:relative!important;min-height:56px!important;padding:12px 13px 12px 17px!important;background:linear-gradient(90deg,rgba(47,128,237,.25),rgba(34,211,238,.07) 58%,rgba(255,255,255,.018))!important;border-left:5px solid #4A90D9!important}
.iv-review-team>summary span{font-size:12px!important;font-weight:950!important;letter-spacing:.055em!important;text-transform:uppercase!important;color:#F4FAFF!important;text-shadow:0 1px 12px rgba(74,144,217,.28)!important}
.iv-review-team>summary span::before{content:"EQUIPE · ";color:#7EC8F0;font-size:8px;font-weight:950;letter-spacing:.13em}
.iv-review-team>summary b{padding:5px 9px!important;border:1px solid rgba(126,200,240,.26)!important;border-radius:999px!important;background:rgba(47,128,237,.24)!important;color:#DDF4FF!important;font-size:9px!important;font-weight:950!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)!important}
.iv-review-team>summary i{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(126,200,240,.10);color:#BFEAFF!important}
.iv-review-team-body{margin:0 9px 9px!important;padding:2px 12px 7px!important;border:1px solid rgba(126,200,240,.07)!important;border-radius:0 0 11px 11px!important;background:rgba(2,9,20,.48)!important}
.iv-review-student-name{font-weight:650!important;color:#D9E8F8!important}
body.iv-report-web .iv-review-team>summary{min-height:68px!important;padding:16px 18px 16px 22px!important;border-left-width:6px!important}
body.iv-report-web .iv-review-team>summary span{font-size:16px!important}
body.iv-report-web .iv-review-team>summary span::before{font-size:10px!important}
body.iv-report-web .iv-review-team>summary b{font-size:11px!important;padding:7px 12px!important}
body.iv-report-web .iv-review-team-body{margin:0 13px 13px!important;padding:4px 16px 10px!important}
@media(max-width:820px){.iv-review-team>summary{grid-template-columns:minmax(0,1fr) auto 22px!important}.iv-review-team>summary span::before{display:block;margin-bottom:2px}}
</style>`;
    return /<\/head>/i.test(html) ? html.replace(/<\/head>/i, css + '</head>') : css + html;
  }

  if(!id){
    document.getElementById('loading').style.display='none';
    document.getElementById('erro').style.display='block';
  } else {
    try {
      const snap = await getDoc(doc(db, "relatorios", id));
      if(snap.exists()){
        const html = aplicarDestaqueEquipes(snap.data().html);
        document.open();
        document.write(html);
        document.close();
      } else {
        document.getElementById('loading').style.display='none';
        document.getElementById('erro').style.display='block';
      }
    } catch(e) {
      console.error(e);
      document.getElementById('loading').style.display='none';
      document.getElementById('erro').style.display='block';
    }
  }
</script>
</body>
</html>
