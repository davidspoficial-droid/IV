<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Relatório — Instituto de Vencedores</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050A14;color:#E8F0FF;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
#loading{text-align:center;padding:40px 20px}
.spinner{width:44px;height:44px;border:4px solid #1E2E4A;border-top-color:#4A90D9;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:16px;color:#7EC8F0;font-weight:600;margin-bottom:6px}
.loading-sub{font-size:12px;color:#6B8AB0}
#erro{display:none;text-align:center;padding:40px 20px}
.erro-icon{font-size:48px;margin-bottom:12px}
.erro-txt{font-size:16px;color:#E05555;font-weight:600;margin-bottom:6px}
.erro-sub{font-size:13px;color:#6B8AB0}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Carregando relatório...</div>
  <div class="loading-sub">Instituto de Vencedores</div>
</div>

<div id="erro">
  <div class="erro-icon">😕</div>
  <div class="erro-txt">Relatório não encontrado</div>
  <div class="erro-sub">O link pode ter expirado ou estar incorreto.</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCAbjeFpJCTfxB9MIsAkM0FYd0cv2OOGh0",
    authDomain: "instituto-de-vencedores-iv.firebaseapp.com",
    projectId: "instituto-de-vencedores-iv",
    storageBucket: "instituto-de-vencedores-iv.firebasestorage.app",
    messagingSenderId: "576601736407",
    appId: "1:576601736407:web:49bf141159071bf6a2dc92",
    measurementId: "G-956ZTG8WM0"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if(!id){
    document.getElementById('loading').style.display='none';
    document.getElementById('erro').style.display='block';
  } else {
    try {
      const snap = await getDoc(doc(db, "relatorios", id));
      if(snap.exists()){
        const html = snap.data().html;
        // Substitui o documento inteiro pelo HTML do relatório
        document.open();
        document.write(html);
        document.close();
      } else {
        document.getElementById('loading').style.display='none';
        document.getElementById('erro').style.display='block';
      }
    } catch(e) {
      console.error(e);
      document.getElementById('loading').style.display='none';
      document.getElementById('erro').style.display='block';
    }
  }
</script>
</body>
</html>
